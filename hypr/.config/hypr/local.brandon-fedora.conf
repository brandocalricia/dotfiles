# brandon-fedora DESKTOP — per-machine Hyprland overrides (untracked, gitignored).
# Sourced by hyprland.conf at the autostart section, BEFORE `$mod = SUPER` is
# defined — so use SUPER literally in binds here, not $mod.

# ── Monitors ──────────────────────────────────────────────────────
# DP-1  : Viewteck GFV24CB  1920x1080@165  (left)
# HDMI-A-1: AOC Q27G3WG8    2560x1440@144  (right)
monitor = DP-1, 1920x1080@165, 0x0, 1
monitor = HDMI-A-1, 2560x1440@143.91, 1920x0, 1
# Reserve the bottom 450px of HDMI-A-1 so other windows auto-tile ABOVE the docked
# Rusty's Retirement bar instead of hiding behind it. Matches the gamescope window
# height below. Format: TOP,BOTTOM,LEFT,RIGHT. (Applies to workspaces 1-5 on this
# monitor; the bar itself only lives on ws1.)
monitor = HDMI-A-1, addreserved, 0, 450, 0, 0

# ── Workspace <-> monitor split ───────────────────────────────────
# MAIN  = HDMI-A-1 (AOC 1440p, right) -> workspaces 1-5, default 1
# SECOND = DP-1    (Viewteck 1080p, left) -> workspaces 6-10, default 6
# Binding by monitor NAME (matches the monitor lines above; stable here).
# To swap which monitor is "main", flip the two monitor names below.
workspace = 1, monitor:HDMI-A-1, default:true, persistent:true
workspace = 2, monitor:HDMI-A-1, persistent:true
workspace = 3, monitor:HDMI-A-1, persistent:true
workspace = 4, monitor:HDMI-A-1, persistent:true
workspace = 5, monitor:HDMI-A-1, persistent:true
workspace = 6, monitor:DP-1, default:true, persistent:true
workspace = 7, monitor:DP-1, persistent:true
workspace = 8, monitor:DP-1, persistent:true
workspace = 9, monitor:DP-1, persistent:true
workspace = 10, monitor:DP-1, persistent:true

# ── File manager (this desktop: dolphin) ──────────────────────────
bind = SUPER, E, exec, dolphin

# ── Screenshots (GMMK Pro has no Print key — remap off Print) ──────
# Tracked hyprland.conf binds these to Print / Super+Print (dead here, fine).
# Super+Shift+S (fast region->clip) stays in the tracked config and works as-is.
bind = SUPER CTRL, S, exec, ~/dotfiles/scripts/screenshot.sh annotate
bind = SUPER ALT, S, exec, ~/dotfiles/scripts/screenshot.sh full

# ── Wallpaper (swww animated transitions) ─────────────────────────
# set-wallpaper.sh seds the 'swww img' path; --transition-type none = instant on login.
exec-once = swww-daemon
exec-once = sleep 1 && swww img /home/brandonrobertniehaus/Pictures/wallpapers/wallhaven-yqv2wx_2560x1440.png --transition-type none

# ── Rusty's Retirement (Steam app 2666510) ────────────────────────
# The game force-fullscreens itself every few seconds and paints the area above
# its bar OPAQUE black (its transparent overlay doesn't blend under Proton on
# Wayland/XWayland — a known, dev-acknowledged game limitation). So it's launched
# INSIDE gamescope at a fixed 2560x450 nested display (see Steam launch options)
# which it cannot resize past, and we float that gamescope window and dock it to
# the bottom of workspace 1. These rules match the gamescope host window only.
windowrule = float on, match:class ^(gamescope)$
windowrule = workspace 1 silent, match:class ^(gamescope)$
windowrule = size 2560 450, match:class ^(gamescope)$
windowrule = move 1920 990, match:class ^(gamescope)$
windowrule = rounding 0, match:class ^(gamescope)$
