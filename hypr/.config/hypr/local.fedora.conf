# Machine-specific overrides — not tracked in git.
# Copy local.conf.example to local.conf and edit for each host.
# Framework Laptop 13: BOE NE135A1M-NY1 panel, 2880x1920@120 (3:2), 2x scale
monitor = eDP-1, 2880x1920@120, 0x0, 2
# NOTE: $mod is defined after this file is sourced — use SUPER literally here
bind = SUPER, E, exec, nautilus
# Wallpaper via swww (animated transitions). set-wallpaper.sh seds the path
# on the 'swww img' line; --transition-type none = instant on login.
exec-once = swww-daemon
exec-once = sleep 1 && swww img /home/brandonrobertniehaus/Pictures/wallpapers/lightblue.png --transition-type none
# Bluetooth tray applet (blueman). Laptop-only for now — the shared hyprland.conf
# stays applet-free so the desktop is unaffected. Provides the systray BT menu.
exec-once = blueman-applet
