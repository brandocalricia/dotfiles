#  ~/.config/hypr/hyprland.conf
#  Brandon's starter Hyprland config — minimal & functional
#  Reload with: hyprctl reload

# ──────────────────────────────────────────────
# Monitor
# ──────────────────────────────────────────────
# Monitors are per-machine — defined in ~/.config/hypr/local.conf (sourced below).
# (desktop: DP-1 + HDMI-A-1 / laptop: eDP-1) — keeps this shared file hardware-agnostic.

# ──────────────────────────────────────────────
# Persistent workspaces
# ──────────────────────────────────────────────
# Single-monitor default (correct as-is for the laptop): 1-10 persistent on the
# only monitor. Multi-monitor hosts split these across outputs by re-declaring
# them with a monitor: clause in ~/.config/hypr/local.conf (sourced below, so it
# wins). See local.conf.example for the split pattern.
workspace = 1, persistent:true
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = 5, persistent:true
workspace = 6, persistent:true
workspace = 7, persistent:true
workspace = 8, persistent:true
workspace = 9, persistent:true
workspace = 10, persistent:true

# Smart gaps: no gaps/rounding when a workspace has a single window
# (w[tv1] = exactly 1 tiled visible window, f[1] = fullscreen state)
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule = rounding 0, match:float 0, match:workspace w[tv1]
windowrule = rounding 0, match:float 0, match:workspace f[1]

# ──────────────────────────────────────────────
# Autostart
# ──────────────────────────────────────────────
exec-once = waybar
exec-once = mako
exec-once = hypridle
# Captive-portal agent: opens the WiFi login page when NM detects a portal
# (airport/hotel/campus WiFi). Hyprland has no DE agent for this. See script header.
exec-once = ~/.config/hypr/captive-portal-watch.sh
source = ~/.config/hypr/local.conf
# Theme border colors (generated by switch-theme.sh; gitignored, seeded from
# colors.conf.base on fresh install). Defines $border_active_1/2 + $border_inactive.
source = ~/.config/hypr/colors.conf
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# Scratchpad daemon (absolute path: session PATH lacks ~/.local/bin)
exec-once = /usr/bin/pypr

# ──────────────────────────────────────────────
# Environment
# ──────────────────────────────────────────────
env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24
# GTK theme comes from gsettings (adw-gtk3-dark) + theme-managed gtk.css —
# do NOT set GTK_THEME here, it overrides both and breaks libadwaita apps
# Qt apps (Dolphin etc.): use the KDE platform theme + Breeze style, which ARE
# installed (plasma-integration + plasma-breeze-qt6). The old gnome/Adwaita-dark
# values referenced qgnomeplatform/adwaita-qt, which are NOT installed → that
# fell back to a broken black-on-black palette (unreadable Dolphin).
env = QT_QPA_PLATFORMTHEME, kde
env = QT_STYLE_OVERRIDE, Breeze

# ──────────────────────────────────────────────
# Input
# ──────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
}

# ──────────────────────────────────────────────
# General appearance
# ──────────────────────────────────────────────
general {
    gaps_in = 3
    gaps_out = 6
    border_size = 2
    col.active_border = $border_active_1 $border_active_2 45deg
    col.inactive_border = $border_inactive
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 4
        passes = 2
    }
    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(00000044)
    }
}

animations {
    enabled = yes
    bezier = ease, 0.25, 0.1, 0.25, 1.0
    animation = windows, 1, 4, ease
    animation = border, 1, 4, ease
    animation = fade, 1, 4, ease
    animation = workspaces, 1, 4, ease
}

dwindle {
    preserve_split = yes
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

# ──────────────────────────────────────────────
# Keybinds  (matches your bible)
# ──────────────────────────────────────────────
$mod = SUPER

# Core
bind = $mod, Return, exec, foot
bind = $mod, Q, killactive,
bind = $mod, M, exit,
# File manager bind is per-machine — define in local.conf
# (desktop: bind = $mod, E, exec, dolphin / laptop: nautilus)
bind = $mod, T, togglefloating,
bind = $mod, R, exec, fuzzel
bind = $mod, P, pseudo,
bind = $mod, F, fullscreen,
bind = $mod, L, exec, hyprlock

# Wallpaper picker (regenerates dynamic theme when active)
bind = $mod SHIFT, W, exec, ~/dotfiles/scripts/set-wallpaper.sh

# Clipboard history (watchers in exec-once pipe into cliphist store)
bind = $mod, V, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy
bind = $mod SHIFT, V, exec, ~/dotfiles/scripts/cliphist-wipe.sh

# Focus
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Move windows
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Scratchpad
bind = $mod, S, togglespecialworkspace, magic

# Pyprland scratchpads (pypr-client = fast socket client)
bind = $mod, grave, exec, /usr/bin/pypr-client toggle term
bind = $mod SHIFT, grave, exec, /usr/bin/pypr-client toggle btop

# Scroll through workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# Mouse drag
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Screenshots (see scripts/screenshot.sh; Super+Shift+S below stays raw for speed)
bind =      , Print, exec, ~/dotfiles/scripts/screenshot.sh full
bind = $mod, Print, exec, ~/dotfiles/scripts/screenshot.sh annotate

# Volume / media (held key repeats)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioPlay,        exec, playerctl play-pause
bindl  = , XF86AudioNext,        exec, playerctl next
bindl  = , XF86AudioPrev,        exec, playerctl previous

# Brightness (if you ever use a laptop)
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ──────────────────────────────────────────────
# Window rules (v3 syntax: effect first, then match:)
# ──────────────────────────────────────────────
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(nm-connection-editor)$

# App -> workspace pins (silent: no focus steal). Feature A's glyphs
# make these visible at a glance.
windowrule = workspace 2 silent, match:class ^(brave-browser)$
windowrule = workspace 10 silent, match:class ^(steam)$
windowrule = workspace 9 silent, match:class ^(spotify|com\.spotify\.Client)$
windowrule = workspace 4 silent, match:class ^(md\.obsidian\.Obsidian|obsidian)$
# VSCode pin (-> 3) intentionally deferred: not installed on this laptop yet.

# File picker dialogs (portal backends): float, center, 60%
windowrule = float on, match:class ^(xdg-desktop-portal-(gtk|gnome))$
windowrule = size 60% 60%, match:class ^(xdg-desktop-portal-(gtk|gnome))$
windowrule = center on, match:class ^(xdg-desktop-portal-(gtk|gnome))$

# Nautilus (Super+E) gets the same floating treatment
windowrule = float on, match:class ^(org\.gnome\.Nautilus)$
windowrule = size 60% 60%, match:class ^(org\.gnome\.Nautilus)$
windowrule = center on, match:class ^(org\.gnome\.Nautilus)$

# Fast region -> clipboard (muscle-memory bind, no annotation/file)
bind = $mod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = $mod, B, exec, brave-browser --password-store=basic

# Apps
bind = $mod SHIFT, G, exec, steam
bind = $mod SHIFT, M, exec, flatpak run com.spotify.Client
bind = $mod SHIFT, B, exec, foot -e btop

# Suppress hyprland-qtutils missing warning (ashbuk COPR doesn't ship it)
ecosystem {
    no_update_news = true
    no_donation_nag = true
    enforce_permissions = false
}
bind = $mod, J, layoutmsg, togglesplit
exec-once = systemctl --user start hyprland-session.target
