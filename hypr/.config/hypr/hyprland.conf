#  ~/.config/hypr/hyprland.conf
#  Brandon's starter Hyprland config — minimal & functional
#  Reload with: hyprctl reload

# ──────────────────────────────────────────────
# Monitor
# ──────────────────────────────────────────────
monitor = , preferred, auto, 1

# ──────────────────────────────────────────────
# Autostart
# ──────────────────────────────────────────────
exec-once = waybar
exec-once = mako
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# ──────────────────────────────────────────────
# Environment
# ──────────────────────────────────────────────
env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24

# ──────────────────────────────────────────────
# Input
# ──────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
}

# ──────────────────────────────────────────────
# General appearance
# ──────────────────────────────────────────────
general {
    gaps_in = 3
    gaps_out = 6
    border_size = 2
    col.active_border = rgba(88c0d0ff) rgba(81a1c1ff) 45deg
    col.inactive_border = rgba(3b4252aa)
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 4
        passes = 2
        new_optimizations = true
    }
    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(00000044)
    }
}

animations {
    enabled = yes
    bezier = ease, 0.25, 0.1, 0.25, 1.0
    animation = windows, 1, 4, ease
    animation = border, 1, 4, ease
    animation = fade, 1, 4, ease
    animation = workspaces, 1, 4, ease
}

dwindle {
    preserve_split = yes
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

# ──────────────────────────────────────────────
# Keybinds  (matches your bible)
# ──────────────────────────────────────────────
$mod = SUPER

# Core
bind = $mod, Return, exec, foot
bind = $mod, Q, killactive,
bind = $mod, M, exit,
bind = $mod, E, exec, dolphin
bind = $mod, V, togglefloating,
bind = $mod, R, exec, fuzzel
bind = $mod, P, pseudo,
bind = $mod, F, fullscreen,
bind = $mod, L, exec, hyprlock
bind = $mod, period, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy

# Focus
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Move windows
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Scratchpad

# Scroll through workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# Mouse drag
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Screenshots
bind =       , Print, exec, grim - | wl-copy
bind = $mod, Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mod SHIFT, Print, exec, mkdir -p ~/Pictures && grim -g "$(slurp)" ~/Pictures/screen-$(date +%s).png

# Volume / media (held key repeats)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioPlay,        exec, playerctl play-pause
bindl  = , XF86AudioNext,        exec, playerctl next
bindl  = , XF86AudioPrev,        exec, playerctl previous

# Brightness (if you ever use a laptop)
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ──────────────────────────────────────────────
# Window rules (add as needed)
# ──────────────────────────────────────────────
windowrule = float class:^(pavucontrol)$
windowrule = float class:^(nm-connection-editor)$

# Screenshots without Print key
bind = $mod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = $mod CTRL,  S, exec, mkdir -p ~/Pictures && grim -g "$(slurp)" ~/Pictures/screen-$(date +%s).png
exec-once = swaybg -i ~/Pictures/wallpapers/alps.png -m fill
bind = $mod, B, exec, brave-browser --password-store=basic

# Suppress hyprland-qtutils missing warning (ashbuk COPR doesn't ship it)
ecosystem {
    no_update_news = true
    no_donation_nag = true
    enforce_permissions = false
}
bind = $mod, J, layoutmsg, togglesplit
exec-once = systemctl --user start hyprland-session.target
