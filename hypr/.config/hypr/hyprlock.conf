background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    contrast = 0.9
    brightness = 0.8
}
input-field {
    monitor =
    size = 280, 56
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(88c0d0ff)
    inner_color = rgba(2e3440b3)
    font_color = rgba(d8dee9ff)
    fade_on_empty = false
    placeholder_text = <i>password...</i>
    hide_input = false
    rounding = 12
    check_color = rgba(a3be8cff)
    fail_color = rgba(bf616aff)
    position = 0, -140
    halign = center
    valign = center
}
label {
    monitor =
    text = cmd[update:1000] date "+%I:%M %p"
    color = rgba(eceff4ff)
    font_size = 110
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 120
    halign = center
    valign = center
}
label {
    monitor =
    text = cmd[update:60000] date "+%A, %B %d"
    color = rgba(88c0d0ff)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 30
    halign = center
    valign = center
}
label {
    monitor =
    text = $USER
    color = rgba(d8dee9e6)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -240
    halign = center
    valign = center
}
