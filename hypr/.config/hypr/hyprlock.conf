background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    contrast = 0.9
    brightness = 0.8
}
input-field {
    monitor =
    size = 280, 56
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(c89412ff)
    inner_color = rgba(1a1612b3)
    font_color = rgba(8a7a5eff)
    fade_on_empty = false
    placeholder_text = <i>password...</i>
    hide_input = false
    rounding = 12
    check_color = rgba(4a7a2aff)
    fail_color = rgba(8a0e09ff)
    position = 0, -140
    halign = center
    valign = center
}
label {
    monitor =
    text = cmd[update:1000] date "+%I:%M %p"
    color = rgba(e8d9b8ff)
    font_size = 110
    font_family = JetBrainsMono NF ExtraBold
    position = 0, 120
    halign = center
    valign = center
}
label {
    monitor =
    text = cmd[update:60000] date "+%A, %B %d"
    color = rgba(c89412ff)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 30
    halign = center
    valign = center
}
label {
    monitor =
    text = $USER
    color = rgba(8a7a5ee6)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -240
    halign = center
    valign = center
}
